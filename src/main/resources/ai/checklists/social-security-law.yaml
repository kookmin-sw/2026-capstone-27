# 사회보장법 (SOCIAL_SECURITY_LAW) 체크리스트
# SHIELD AI가 사실관계 수집 시 참조하는 필수/선택 항목

## 수집해야 할 항목 (체크리스트)

아래 항목을 대화를 통해 수집하세요. chatHistory를 분석하여 이미 수집된 항목은 건너뛰세요.

### 공통 필수 항목
1. 사건 유형 (부당해고/임금체불/산재/연금 등)
2. 근무 기간 (입사일 ~ 퇴사일/현재)
3. 고용 형태 (정규직/계약직/일용직/프리랜서)
4. 월급/시급 금액
5. 근로계약서 작성 여부
6. 사건 발생 경위
7. 증거자료 보유 여부
8. 원하는 결과

### 부당해고 (UNFAIR_DISMISSAL) 추가 항목
1. 해고 일시
2. 해고 사유 (회사 측 설명)
3. 해고 통보 방식 (구두/서면)
4. 해고 예고 여부 (30일 전)

### 임금체불 (WAGE_THEFT) 추가 항목
1. 체불 금액 (급여/퇴직금/수당)
2. 체불 기간
3. 지급 요청 이력
4. 사업주 연락 가능 여부

### 산재 (INDUSTRIAL_ACCIDENT) 추가 항목
1. 사고 발생 일시
2. 사고 발생 장소 (사업장 내/외)
3. 부상/질병 내용
4. 치료 경과
5. 산재 신청 여부

### 연금 (PENSION) 추가 항목
1. 관련 기관 (국민연금/건강보험 등)
2. 문제 내용 (미가입/누락/지급 거부 등)
3. 가입 기간
4. 분쟁 경위
