# 상법 (COMMERCIAL_LAW) 체크리스트
# SHIELD AI가 사실관계 수집 시 참조하는 필수/선택 항목

## 수집해야 할 항목 (체크리스트)

아래 항목을 대화를 통해 수집하세요. chatHistory를 분석하여 이미 수집된 항목은 건너뛰세요.

### 공통 필수 항목
1. 분쟁 유형 (회사 분쟁/보험/상거래 등)
2. 회사 형태 (주식회사/합자/개인 등)
3. 분쟁 상대방 (회사/개인)
4. 분쟁 발생 시기
5. 피해 금액
6. 관련 계약서/문서 존재 여부
7. 원하는 결과

### 회사 분쟁 (CORPORATE_DISPUTE) 추가 항목
1. 본인의 지분/직위
2. 분쟁 상대방의 지분/직위
3. 분쟁 경위
4. 주주간 계약서 존재 여부

### 보험 (INSURANCE) 추가 항목
1. 보험 유형 (생명/손해/자동차 등)
2. 보험사 이름
3. 사고/질병 경위
4. 보험금 청구 내역
5. 보험사 거부 사유

### 상거래 (COMMERCIAL_TRANSACTION) 추가 항목
1. 거래 내용 (물품/서비스)
2. 거래 금액
3. 계약서 존재 여부
4. 분쟁 경위
5. 이행/미이행 내용
