spring:
  application:
    name: shield

  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # PostgreSQL
  datasource:
    url: ${DB_URL}?prepareThreshold=0&stringtype=unspecified
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway (Phase A: PostgreSQL 마이그레이션 단일 소스화)
  # - ddl-auto: none 과 짝을 이뤄 Flyway가 스키마 관리자
  # - flyway_schema_history 부재 가정 → baseline-on-migrate=true, baseline-version=1 (V2부터 apply)
  # - placeholder-replacement=false: V3의 PL/pgSQL $$...$$ 및 SQL 내 ${...} 치환 사고 사전 차단
  flyway:
    enabled: true
    url: ${DB_URL}?prepareThreshold=0&stringtype=unspecified
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    locations: classpath:db/migration
    schemas: public
    table: flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Initial baseline before Flyway adoption"
    validate-on-migrate: true
    out-of-order: false
    placeholder-replacement: false

# JWT
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000
  refresh-token-expiry: 1209600000

# Google OAuth
google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI}

# Supabase Storage
supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    bucket: lawyer_documents

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

# Cohere Chat API (v2)
# - Endpoint: POST https://api.cohere.com/v2/chat
# - Trial API Key 해도 주요 프로덕션 모델을 모두 호출 가능 (무료 티어)
# - 모델 후보: command-a-03-2025(최신 플래그십), command-r-plus-08-2024, command-r-08-2024
cohere:
  api-key: ${COHERE_API_KEY}
  base-url: https://api.cohere.com
  model:
    chat: command-a-03-2025
    brief: command-a-03-2025
  timeout:
    connect: 5000
    read-chat: 30000
    read-brief: 60000
    read-classify: 15000
  chat:
    max-history-messages: 20
  classify:
    model: command-a-03-2025
    temperature: 0.1
    max-tokens: 512

# RAG 검색 설정
#
# 기본값 true (Stub 활성화):
#   Phase A-5에서 PgLegalRetrievalService를 구현했으나,
#   legal_chunks 테이블이 비어 있는 현 시점에서 PG 검색을 기본으로 켜면
#   검색 결과가 항상 비어 RAG 응답 품질이 저하된다.
#
# 활성화 시점:
#   ① 법령 청크 인제스트 파이프라인 구축 및 실데이터 적재 완료 후
#   ② 확인된 환경(stg → prod)에서 RAG_STUB=false 명시적 지정
#   ③ 전체 전환은 application.yml 기본값을 false로 변경
rag:
  retrieval:
    stub: ${RAG_STUB:true}
    # 하이브리드 점수 가중치 (Phase A-5 Review - R3)
    # 중기적으로 실데이터 기반 MRR 그리드 서치로 튜닝
    # 합이 1.0일 필요는 없지만 해석을 위해 권장
    weights:
      vector: ${RAG_W_VECTOR:0.6}    # 자연어 ts_rank (plainto_tsquery AND)
      keyword: ${RAG_W_KEYWORD:0.3}  # 키워드 ts_rank (to_tsquery OR)
      trigram: ${RAG_W_TRIGRAM:0.1}  # pg_trgm similarity (한국어 'simple' 보조)

# 온톨로지 설정
ontology:
  slim-json-path: classpath:ontology/legal-ontology-slim.json
  cache-ttl-minutes: 60

# CORS
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:5174

server:
  port: 8080
