# 이혼·위자료·재산분할 — SHIELD AI 사실관계 수집 체크리스트
# 온톨로지 L1 "이혼·위자료·재산분할" 전용. L2 4개 / L3 14개 포함.

meta:
  l1: "이혼·위자료·재산분할"
  slug: divorce
  version: 1

l1_checklist:
  required:
    - 상대방 정보 (배우자, 연락 가능 여부, 현재 거주 상태)
    - 발생 시기 (혼인일, 별거 시작일, 분쟁 발생 시점)
    - 관련 금액 (재산 규모, 위자료·재산분할 희망 금액)
    - 관련 문서 (혼인관계증명서, 부동산·금융 자료)
    - 증거 자료 (유책 행위 증거, 재산 증빙, 문자·이메일)
    - 기존 조치 이력 (가정법원 신청, 협의 이력)
    - 원하는 결과 (이혼/위자료/재산분할/양육권)
  domain_specific:
    - 혼인 기간 및 별거 상태
    - 이혼 사유 (유책 사유, 합의 여부)
    - 자녀 존재 여부 및 양육 상황
    - 공동 재산 목록 (부동산/예금/주식/사업체)
    - 재혼·동거 상대 존재 여부

l2_checklists:
  이혼 절차:
    focus:
      - 이혼 유형 (협의/재판)
      - 이혼 숙려기간 경과 여부
      - 가정법원 신청 단계
    l3_checklists:
      협의이혼:
        - 협의이혼 신청일
        - 자녀 양육·친권 합의서 작성 여부
        - 숙려기간 (1개월 또는 3개월) 경과 여부
      재판상 이혼:
        - 소장 제출 여부 및 법원
        - 재판 진행 단계 (조정/변론/판결)
        - 답변서·준비서면 제출 현황
      이혼 사유 및 책임:
        - 민법 제840조 사유 해당 여부 (부정행위/악의의 유기 등)
        - 유책 행위 시점 및 증거
        - 쌍방 책임 여부
      혼인무효 및 취소:
        - 혼인 신고 당시 무효·취소 사유 존재 여부
        - 무효·취소 주장 시점
        - 관련 증거 자료

  위자료:
    focus:
      - 정신적 고통 발생 원인
      - 위자료 청구 상대방 (배우자/제3자)
      - 청구 금액 산정 근거
    l3_checklists:
      청구 요건 및 책임주체:
        - 유책 행위 내용 및 증거
        - 상대방 귀책 정도
        - 청구권자 지위 (배우자/직계혈족)
      산정 기준:
        - 혼인 기간 및 파탄 경위
        - 쌍방 재산·소득 수준
        - 유책 행위의 악성 정도
      제3자 책임:
        - 제3자(상간자 등) 식별 및 연락처
        - 제3자 가담 시점 및 증거
        - 제3자에 대한 청구 의사

  재산분할:
    focus:
      - 재산 형성·취득 경위
      - 기여도 산정 근거
      - 분할 대상 재산 특정
    l3_checklists:
      분할 대상 재산 특정:
        - 부동산·예금·주식·보험 목록
        - 혼인 전 재산과의 구분
        - 명의자·실소유자 구분
      기여도 산정:
        - 경제활동 기여 (소득·사업)
        - 가사·육아 기여
        - 재산 형성 시점의 혼인 상태
      채무 분담:
        - 공동채무 목록 및 금액
        - 채무 발생 경위 (생활비/투자/도박 등)
        - 채무 분담 쟁점
      분할 방법 및 집행:
        - 현물 분할 vs 대금 정산 선호
        - 분할 후 명의 이전 절차
        - 집행 지연 사유

  자녀 및 양육:
    focus:
      - 자녀 연령 및 현재 양육자
      - 친권·양육권 분쟁 여부
      - 양육비 협의 상태
    l3_checklists:
      친권 및 양육권:
        - 자녀 연령 및 의사 (만 13세 이상)
        - 현재 주된 양육자
        - 양육 환경 비교 (주거·소득·조력자)
      양육비 산정 및 청구:
        - 자녀 연령대별 표준 양육비표 적용 여부
        - 현재 양육비 지급 이력
        - 미지급 양육비 누적 금액
      면접교섭권:
        - 면접 교섭 빈도·방식 협의 상태
        - 면접 방해 여부
        - 비양육자 거주 지역
