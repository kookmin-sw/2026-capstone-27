spring:
  application:
    name: shield

  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Redis (Phase B-5 — 쿼리 임베딩 캐시)
  # host가 설정되지 않으면 RedisEmbeddingCache가 등록되지 않고 Noop로 자동 전환.
  # 로컬 개발에서는 REDIS_HOST를 비워 두고 운영 환경에서만 주입하는 것을 권장.
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      client-type: lettuce

  # PostgreSQL
  datasource:
    url: ${DB_URL}?prepareThreshold=0&stringtype=unspecified
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway (Phase A: PostgreSQL 마이그레이션 단일 소스화)
  # - ddl-auto: none 과 짝을 이뤄 Flyway가 스키마 관리자
  # - flyway_schema_history 부재 가정 → baseline-on-migrate=true, baseline-version=1 (V2부터 apply)
  # - placeholder-replacement=false: V3의 PL/pgSQL $$...$$ 및 SQL 내 ${...} 치환 사고 사전 차단
  flyway:
    enabled: true
    url: ${DB_URL}?prepareThreshold=0&stringtype=unspecified
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    locations: classpath:db/migration
    schemas: public
    table: flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Initial baseline before Flyway adoption"
    validate-on-migrate: true
    out-of-order: false
    placeholder-replacement: false

# JWT
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000
  refresh-token-expiry: 1209600000

# Google OAuth
google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI}

# Supabase Storage
supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    bucket: lawyer_documents

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

# Cohere Chat API (v2)
# - Endpoint: POST https://api.cohere.com/v2/chat
# - Trial API Key 해도 주요 프로덕션 모델을 모두 호출 가능 (무료 티어)
# - 모델 후보: command-a-03-2025(최신 플래그십), command-r-plus-08-2024, command-r-08-2024
cohere:
  api-key: ${COHERE_API_KEY}
  base-url: https://api.cohere.com
  model:
    chat: command-a-03-2025
    brief: command-a-03-2025
    embed: embed-v4.0
  timeout:
    connect: 5000
    read-chat: 30000
    read-brief: 60000
    read-classify: 15000
    read-embed: 30000
  embed:
    batch-size: 96
    dimension: 1024
  chat:
    max-history-messages: 20
  classify:
    model: command-a-03-2025
    temperature: 0.1
    max-tokens: 512

# RAG 검색 설정
#
# 기본값 true (Stub 활성화):
#   Phase A-5에서 PgLegalRetrievalService를 구현했으나,
#   legal_chunks 테이블이 비어 있는 현 시점에서 PG 검색을 기본으로 켜면
#   검색 결과가 항상 비어 RAG 응답 품질이 저하된다.
#
# 활성화 시점:
#   ① 법령 청크 인제스트 파이프라인 구축 및 실데이터 적재 완료 후
#   ② 확인된 환경(stg → prod)에서 RAG_STUB=false 명시적 지정
#   ③ 전체 전환은 application.yml 기본값을 false로 변경
rag:
  retrieval:
    stub: ${RAG_STUB:true}
    # 3-way 하이브리드 점수 가중치 (Phase B-4 재설계)
    # 경로:
    #  - vector:  Cohere embed-v4.0 임베딩 ↔ pgvector cosine similarity (0~1)
    #  - keyword: BM25 ts_rank on content_tsv (to_tsquery OR)
    #  - trigram: pg_trgm similarity (오탈자/부분일치 보조)
    # 합이 1.0일 필요는 없지만 해석을 위해 권장.
    # 중기적으로 실데이터 기반 MRR 그리드 서치로 튜닝.
    weights:
      vector: ${RAG_W_VECTOR:0.5}    # pgvector cosine similarity
      keyword: ${RAG_W_KEYWORD:0.3}  # BM25 ts_rank
      trigram: ${RAG_W_TRIGRAM:0.2}  # pg_trgm similarity
    # HNSW 튜닝 (Phase B-5)
    # - ef_search: 쿼리 시점 탐색 큐 크기. 높을수록 recall 상승, 지연 증가.
    #   pgvector 기본값 40. 1,193행 규모의 실측 벤치마크에서 topK=10 기준
    #   ef=40에서 이미 recall 100% 달성 (scripts/benchmark_hnsw_ef_search.py).
    #   데이터 규모가 커지면 80~200 권장. 재빌드 없이 환경변수로 조정 가능.
    hnsw:
      ef-search: ${RAG_HNSW_EF_SEARCH:40}
  # 쿼리 임베딩 Redis 캐시 (Phase B-5)
  # Redis 연결(spring.data.redis.host) 미설정 시 자동으로 Noop로 전환.
  cache:
    embedding:
      enabled: ${RAG_EMBED_CACHE_ENABLED:true}
      ttl-seconds: ${RAG_EMBED_CACHE_TTL:86400}  # 기본 24시간

# 온톨로지 설정
ontology:
  slim-json-path: classpath:ontology/legal-ontology-slim.json
  cache-ttl-minutes: 60

# CORS
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:5174

server:
  port: 8080
