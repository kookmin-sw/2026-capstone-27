spring:
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration

# ALB 뒤에서 HTTPS 프록시 처리
server:
  forward-headers-strategy: framework

# 프로덕션 CORS
app:
  cors:
    allowed-origins: https://shieldai.kr,https://www.shieldai.kr,https://api.shieldai.kr

# 프로덕션 로깅
logging:
  level:
    root: WARN
    org.example.shield: INFO
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 500MB

# Actuator (ALB 헬스체크)
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  health:
    db:
      enabled: true
    mongodb:
      enabled: false
