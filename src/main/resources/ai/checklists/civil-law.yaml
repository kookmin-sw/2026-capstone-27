# 민법 (CIVIL_LAW) 체크리스트
# SHIELD AI가 사실관계 수집 시 참조하는 필수/선택 항목

## 수집해야 할 항목 (체크리스트)

아래 항목을 대화를 통해 수집하세요. chatHistory를 분석하여 이미 수집된 항목은 건너뛰세요.

### 공통 필수 항목
1. 분쟁 유형 (보증금/계약/손해배상/상속 등)
2. 분쟁 상대방 정보 (개인/법인, 연락 가능 여부)
3. 분쟁 발생 시기
4. 피해 금액 또는 분쟁 대상 금액
5. 관련 계약서/문서 존재 여부
6. 기존 법적 조치 이력
7. 원하는 결과

### 전세보증금 (DEPOSIT_FRAUD) 추가 항목
1. 보증금 금액
2. 계약 기간 (시작일 ~ 종료일)
3. 전입신고 여부
4. 확정일자 취득 여부
5. 임대인 연락 가능 여부
6. 보증금 미반환 경위
7. 현재 거주 상태 (아직 거주 중 / 이미 퇴거)

### 계약 분쟁 (CONTRACT_DISPUTE) 추가 항목
1. 계약 유형 (매매/용역/임대 등)
2. 계약 체결 일시
3. 계약 내용 요약
4. 위반 사항
5. 피해 금액

### 손해배상 (DAMAGES) 추가 항목
1. 피해 발생 경위
2. 피해 유형 (신체/재산/정신적)
3. 피해 금액
4. 가해자 정보
5. 증거자료

### 상속 (INHERITANCE) 추가 항목
1. 피상속인과의 관계
2. 상속 재산 규모/내용
3. 유언장 존재 여부
4. 다른 상속인 정보
5. 분쟁 내용
