# 형법 (CRIMINAL_LAW) 체크리스트
# SHIELD AI가 사실관계 수집 시 참조하는 필수/선택 항목

## 수집해야 할 항목 (체크리스트)

아래 항목을 대화를 통해 수집하세요. chatHistory를 분석하여 이미 수집된 항목은 건너뛰세요.

### 필수 항목
1. 사건 유형 (폭행/사기/명예훼손/절도 등)
2. 사건 발생 일시 (날짜, 시간대)
3. 사건 발생 장소
4. 피해 내용 (신체적/재산적/정신적)
5. 가해자와의 관계 (모르는 사람/지인/가족 등)
6. 가해자 특정 가능 여부 (이름, 연락처 등)
7. 경찰 신고 여부 (신고 시 사건번호)
8. 증거자료 보유 여부 (CCTV, 진단서, 녹음 등)
9. 원하는 결과 (처벌/합의/손해배상 등)

### 선택 항목
1. 목격자 존재 여부
2. 기존 법적 조치 이력 (고소장 제출 등)
3. 가해자의 사과/연락 여부
4. 피해 치료 여부 및 비용
