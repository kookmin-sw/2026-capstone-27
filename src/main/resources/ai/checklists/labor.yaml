# 근로계약·해고·임금 — SHIELD AI 사실관계 수집 체크리스트
# 온톨로지 L1 "근로계약·해고·임금" 전용. L2 5개 / L3 18개 포함.

meta:
  l1: "근로계약·해고·임금"
  slug: labor
  version: 1

l1_checklist:
  required:
    - 상대방 정보 (사업주, 회사명, 담당자)
    - 발생 시기 (입사일, 퇴사일, 분쟁 발생일)
    - 관련 금액 (월급, 체불 임금, 퇴직금)
    - 관련 문서 (근로계약서, 임금명세서, 취업규칙)
    - 증거 자료 (출근 기록, 통장 내역, 업무 지시 증거)
    - 기존 조치 이력 (노동청 진정, 내용증명)
    - 원하는 결과 (임금 지급, 복직, 손해배상)
  domain_specific:
    - 근로 형태 (정규직/계약직/파견/프리랜서)
    - 입사·퇴사 시점
    - 근로계약서 존재 여부 및 내용
    - 사업장 규모 (상시 근로자 수)
    - 노동조합 존재 여부

l2_checklists:
  근로계약:
    focus:
      - 계약 형식 (서면/구두)
      - 근로조건 명시 여부
      - 근로자성 인정 쟁점
    l3_checklists:
      계약 성립 및 근로조건:
        - 계약서 서면 작성 여부
        - 임금·근로시간·휴일 명시 여부
        - 계약 기간 및 갱신 조건
      고용형태 및 비정규직:
        - 계약직·파견·단시간 근로 구분
        - 기간제 사용 사유 및 2년 경과 여부
        - 차별적 처우 존재 여부
      근로자성 판단:
        - 지휘·감독 관계 여부
        - 업무 수행 방식 (장소·시간 지정)
        - 실질적 근로 제공 관계

  임금 및 수당:
    focus:
      - 임금 체불 금액·기간
      - 통상임금·평균임금 산정 쟁점
      - 퇴직금 산정 근거
    l3_checklists:
      임금체불 및 지급청구:
        - 체불 월수 및 금액
        - 최종 지급일
        - 노동청 진정 여부
      통상임금 및 평균임금:
        - 정기성·일률성·고정성 요건
        - 상여금·수당 포함 여부
        - 산정 기간 (평균임금 3개월)
      법정수당 산정:
        - 연장·야간·휴일근로 시간
        - 가산 수당 지급 여부
        - 포괄임금제 약정 존재 여부
      퇴직금 및 퇴직급여:
        - 계속근로기간 (1년 이상)
        - 퇴직금·퇴직연금 선택 여부
        - 중간정산 이력

  근로시간 및 휴가:
    focus:
      - 소정근로시간·연장근로 규모
      - 연차휴가 사용·정산
      - 휴직 사유 및 복직 요구
    l3_checklists:
      근로시간 및 연장근로:
        - 주 40시간 초과 여부
        - 연장근로 주 12시간 한도 준수
        - 근로시간 기록 존재 여부
      휴게·휴일 및 연차휴가:
        - 4시간당 30분 휴게 부여 여부
        - 주휴일 유급 지급 여부
        - 연차 발생·사용·미사용 수당
      휴직 및 복직:
        - 휴직 사유 (육아/질병/병역 등)
        - 복직 요청 시점 및 방식
        - 복직 거부·불리한 처우 여부

  해고 및 징계:
    focus:
      - 해고·징계 사유 및 절차
      - 징계위원회 절차 준수 여부
      - 해고 서면 통지 여부
    l3_checklists:
      징계 사유 및 절차:
        - 취업규칙상 징계 사유
        - 징계위원회 구성·통보 절차
        - 소명 기회 부여 여부
      해고의 정당성:
        - 사회통념상 타당한 해고 사유
        - 해고 전 개선 기회 제공 여부
        - 다른 근로자와의 형평성
      경영상 해고:
        - 경영상 해고 필요성 근거 (긴박한 경영상 이유)
        - 해고 회피 노력 존재 여부
        - 대상자 선정 기준의 합리성
      부당해고 구제:
        - 노동위원회 구제신청 기한 (3개월)
        - 복직·금전보상 희망 여부
        - 재심·행정소송 진행 여부

  직장 내 권리보호:
    focus:
      - 직장 내 괴롭힘·차별 발생 경위
      - 성희롱·모성보호 위반 여부
      - 산업재해 발생 경과
    l3_checklists:
      직장 내 괴롭힘:
        - 괴롭힘 유형 (언어/물리/업무)
        - 발생 기간 및 빈도
        - 사업주 신고 및 조치 여부
      성희롱 및 차별:
        - 성희롱 행위 내용·시점
        - 차별 사유 (성별/연령/고용형태 등)
        - 노동위원회·인권위 진정 여부
      모성보호 및 일·가정 양립:
        - 출산전후휴가·육아휴직 사용 이력
        - 사용 거부·불리한 처우 여부
        - 육아기 근로시간 단축 신청
      산업재해 및 보상:
        - 사고 발생 일시·장소
        - 산재 신청 및 승인 여부
        - 요양·장해 등급
