# 부동산 거래 — SHIELD AI 사실관계 수집 체크리스트
# 온톨로지 L1 "부동산 거래" 전용. L2 4개 / L3 20개 포함.

meta:
  l1: "부동산 거래"
  slug: real-estate
  version: 1

# L1 공통 항목 — 해당 L1의 모든 상담이 수집
l1_checklist:
  required:
    - 상대방 정보 (개인/법인, 연락 가능 여부, 관계)
    - 발생 시기 (분쟁 시작일, 사건 발생일)
    - 관련 금액 (피해액, 거래가, 보증금 등)
    - 관련 문서 (계약서, 증명서 등 존재 여부)
    - 증거 자료 (사진, 녹음, 이체내역, 문자, 이메일)
    - 기존 조치 이력 (신고, 내용증명, 소송 등)
    - 원하는 결과 (배상, 이행, 해지, 회복 등)
  domain_specific:
    - 부동산 종류 (아파트/주택/토지/상가/오피스텔)
    - 거래 유형 (매매/임대차/담보)
    - 소재지
    - 등기부 확인 여부
    - 특약 사항

# L2 중분류별 심화 체크리스트
l2_checklists:
  부동산 매매:
    focus:
      - 매매 단계 (가계약/본계약/중도금/잔금/등기)
      - 하자 발견 시점 (계약 전/후)
      - 하자 유형 (누수/균열/고지되지 않은 사실)
      - 특약 사항 존재 여부
    l3_checklists:
      계약 체결 및 효력:
        - 가계약금 지급 여부 및 금액
        - 계약서 작성 및 서명 여부
        - 계약 당사자 확인 (등기부상 소유자 여부)
      대금 지급 및 정산:
        - 중도금·잔금 지급 일정 및 이행 여부
        - 대금 지급 방식 (계좌이체/현금/대출)
        - 정산 지연 사유
      계약 해제·해지:
        - 해제 사유 (이행지체/합의/사기 등)
        - 해제 의사 통지 방식 및 시점
        - 계약금 반환·배액 배상 쟁점
      하자담보책임:
        - 하자 발견 시점 및 매수인 통지 시점
        - 매도인 고지 의무 위반 여부
        - 하자의 중대성 및 수리 견적
      소유권 이전 및 등기:
        - 등기 이전 완료 여부
        - 등기 지연 사유
        - 제3자 권리 (가압류/가등기) 존재 여부
      명의신탁 및 이중매매:
        - 실소유자·등기명의인 관계
        - 이중매매 여부 및 인지 시점
        - 명의신탁 약정 존재 여부

  부동산 임대차:
    focus:
      - 전입신고·확정일자·대항력 상태
      - 보증금 반환 단계 (계약 종료/점유 중)
      - 계약 갱신 시점 및 방식
      - 차임 연체 이력
    l3_checklists:
      계약 체결 및 조건:
        - 계약 기간 및 체결일
        - 보증금·차임 금액
        - 특약 사항 (수선 의무, 원상회복 범위 등)
      보증금 및 차임:
        - 보증금 반환 지연 일수
        - 차임 연체 회수·금액
        - 보증금 증액 요구 범위 (5% 초과 여부)
      계약 갱신 및 종료:
        - 갱신요구권 행사 시점
        - 임대인 갱신 거절 사유
        - 묵시적 갱신 여부
      명도 및 인도:
        - 점유 이전 상태
        - 인도 지연 사유
        - 명도소송·강제집행 경과
      수선·원상회복 및 비용:
        - 수선 대상 범위 (필수 수선/통상 수선)
        - 원상회복 의무 발생 시점
        - 비용 부담 주체 분쟁

  부동산 담보:
    focus:
      - 담보권 설정 시점 및 방식
      - 피담보채권 금액 및 이행 상태
      - 경매 진행 단계
    l3_checklists:
      저당권 및 근저당권:
        - 저당권 설정 계약 존재 여부
        - 피담보채권 액수 및 변제 상태
        - 근저당권 채권최고액
      용익물권 및 전세권:
        - 전세권 등기 여부
        - 전세금·존속기간
        - 용익물권 설정 경위
      담보권 실행 및 경매:
        - 경매 신청 시점 및 기관
        - 현재 경매 단계 (신청/배당/종료)
        - 유치권·대항력 주장 존재 여부
      배당 및 우선순위:
        - 배당요구 종기 경과 여부
        - 배당 순위 및 금액
        - 우선변제권 행사 의사
      담보권 말소 및 변경:
        - 말소 사유 (변제/합의/소멸시효)
        - 말소등기 신청 주체
        - 등기부 현황

  부동산 권리관계:
    focus:
      - 공유·지분 구조
      - 경계 분쟁 발생 위치
      - 점유 관계 및 인도 요구
    l3_checklists:
      공유 및 지분관계:
        - 공유자 수 및 각 지분 비율
        - 공유물 관리·처분 분쟁
        - 공유물 분할 의사
      경계 및 인접관계:
        - 경계 분쟁 대상 필지
        - 측량 결과 존재 여부
        - 인접 소유자와의 협의 경과
      점유 및 인도청구:
        - 현재 점유자
        - 점유 권원 (임차/무단 등)
        - 인도청구 사유 및 절차
      권리귀속 및 확인:
        - 진정한 권리자 분쟁 쟁점
        - 등기부 기재 현황
        - 권리귀속 확정 소송 필요성
