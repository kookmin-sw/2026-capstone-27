# 상속·유류분·유언 — SHIELD AI 사실관계 수집 체크리스트
# 온톨로지 L1 "상속·유류분·유언" 전용. L2 4개 / L3 15개 포함.

meta:
  l1: "상속·유류분·유언"
  slug: inheritance
  version: 1

l1_checklist:
  required:
    - 상대방 정보 (다른 상속인, 유증 수유자)
    - 발생 시기 (피상속인 사망일, 분쟁 시작일)
    - 관련 금액 (상속재산 규모, 유류분 청구액)
    - 관련 문서 (사망진단서, 가족관계증명서, 유언장)
    - 증거 자료 (재산 목록, 증여 이력, 특별수익 증빙)
    - 기존 조치 이력 (상속포기·한정승인 신고 여부)
    - 원하는 결과 (분할/반환/집행)
  domain_specific:
    - 피상속인 사망일자
    - 상속인 구성 (배우자, 자녀, 형제 등)
    - 상속 재산 범위 (부동산, 예금, 주식, 채무)
    - 유언장 존재 여부 및 방식
    - 특별수익·기여분 쟁점

l2_checklists:
  상속 일반:
    focus:
      - 상속인 확정 단계
      - 상속재산 조사 진행 상태
      - 공동상속인 간 협의 상황
    l3_checklists:
      상속순위 및 상속분:
        - 법정 상속순위 (배우자·직계비속·직계존속·형제자매)
        - 각 상속인별 법정 상속분
        - 공동상속인 수
      대습상속 및 결격:
        - 선순위 상속인 사망·결격 사유
        - 대습상속인 존재 여부
        - 결격 사유 해당 행위 내용
      상속재산의 범위:
        - 적극재산 목록 (부동산·예금·주식 등)
        - 소극재산 목록 (채무·세금)
        - 보험금·퇴직금 등 포함 여부
      특별수익 및 기여분:
        - 생전 증여·유증 이력 및 금액
        - 기여분 주장자의 기여 내용
        - 기여 시점 및 증거

  상속재산 처리:
    focus:
      - 상속 수리 여부 (단순승인/한정승인/포기)
      - 상속재산 분할 방식
      - 상속채무 처리 전략
    l3_checklists:
      상속재산 분할:
        - 협의분할·조정·심판분할 중 선택 단계
        - 분할 대상 재산 확정 여부
        - 분할 방법 (현물/대금)
      상속채무 및 청산:
        - 채무 총액 및 채권자 목록
        - 적극재산 대비 채무 비율
        - 채권자 청구 현황
      상속포기:
        - 상속 개시 인지 시점
        - 포기 신고 기한 (3개월) 경과 여부
        - 포기로 인한 차순위 상속인 영향
      한정승인:
        - 한정승인 신고 여부 및 시점
        - 상속재산목록 작성 현황
        - 채권자 공고·최고 절차

  유언:
    focus:
      - 유언 방식 (자필/공정증서/비밀/녹음/구수)
      - 유언 작성 시 유언자 의사능력
      - 유언 집행 단계
    l3_checklists:
      유언 방식 및 요건:
        - 유언 작성일 및 장소
        - 증인 요건 충족 여부
        - 유언 방식별 형식 준수 여부
      유언 효력 및 무효:
        - 유언자 유언능력 (만 17세 이상)
        - 유언 내용의 구체성·확정성
        - 위조·변조 주장 근거
      유언 집행:
        - 유언집행자 지정 여부
        - 유증 목적물 특정 상태
        - 집행 지연 사유

  유류분:
    focus:
      - 유류분 권리자 지위
      - 유류분 부족액 산정
      - 반환청구 상대방 특정
    l3_checklists:
      유류분 권리자 및 비율:
        - 유류분 권리자 지위 (배우자·직계비속 등)
        - 해당 상속분 대비 유류분 비율
        - 공동 유류분 권리자 존재 여부
      유류분 산정:
        - 상속개시 시점 재산 가액
        - 생전 증여·유증 가액 산정
        - 상속채무 공제
      증여·유증과 유류분:
        - 증여 시점 (상속 개시 1년 이내 여부)
        - 수증자의 악의 여부
        - 유증 목적물 특정 및 가액
      유류분 반환청구:
        - 반환청구 제척기간 (1년·10년) 경과 여부
        - 반환 대상자 특정
        - 반환 방법 (원물/가액)
