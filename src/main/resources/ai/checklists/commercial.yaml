# 기업·상사거래 — SHIELD AI 사실관계 수집 체크리스트
# 온톨로지 L1 "기업·상사거래" 전용. L2 5개 / L3 22개 포함.

meta:
  l1: "기업·상사거래"
  slug: commercial
  version: 1

l1_checklist:
  required:
    - 상대방 정보 (법인/개인사업자, 담당자)
    - 발생 시기 (계약일, 이행기, 분쟁 발생일)
    - 관련 금액 (계약 금액, 미지급 대금, 손해액)
    - 관련 문서 (계약서, 발주서, 세금계산서)
    - 증거 자료 (납품 증빙, 이메일, 회의록)
    - 기존 조치 이력 (독촉장, 내용증명, 조정·중재)
    - 원하는 결과 (이행/해제/손해배상)
  domain_specific:
    - 거래 유형 (납품/용역/도급/대리점/가맹 등)
    - 계약 당사자 (법인/개인사업자)
    - 계약 금액 및 이행 기간
    - 계약서·발주서 존재 여부
    - 분쟁 쟁점 (이행 지체/하자/대금 미지급 등)

l2_checklists:
  상사계약 일반:
    focus:
      - 계약 체결·해석 분쟁 쟁점
      - 이행 상태 및 위반 내용
      - 해제 사유 및 손해액
    l3_checklists:
      계약 체결 및 해석:
        - 계약서 작성 여부 및 서명권자
        - 약관·특약 조항 해석 다툼
        - 교섭 과정·구두 합의 증거
      계약 이행 및 위반:
        - 이행 기한 및 이행 상태
        - 위반 내용 (지체/불완전이행/이행거절)
        - 이행 최고 통지 여부
      대금 지급 및 정산:
        - 청구 금액 및 미지급액
        - 세금계산서 발행 여부
        - 정산 방식 및 지급 조건
      해제·해지 및 손해배상:
        - 해제·해지 사유 및 통지 시점
        - 손해액 산정 근거
        - 계약상 손해배상액 예정 조항

  납품·공급·도급:
    focus:
      - 납품·도급 대상 및 수량
      - 검수·인수 단계
      - 하자·클레임 처리
    l3_checklists:
      물품공급 및 납품계약:
        - 납품 품목·수량·규격
        - 납품 지체 일수 및 사유
        - 위약금·지체상금 조항
      용역 및 위탁계약:
        - 용역 범위 및 산출물 정의
        - 업무 수행 기간
        - 재위탁·하도급 허용 여부
      도급 및 제작계약:
        - 도급 목적물 사양
        - 제작 진행률 및 기성 지급
        - 설계 변경 이력
      검수·인수 및 지체:
        - 검수 기준 및 일정
        - 검수 지연 사유
        - 인수 거부 여부 및 근거
      하자담보 및 클레임:
        - 하자 발견 시점 및 통지
        - 하자 보수·손해배상 요구
        - 하자담보 기간 경과 여부

  유통·가맹·대리점:
    focus:
      - 가맹·대리점 계약 구조
      - 정보공개서·거래조건
      - 거래중단·불공정행위 쟁점
    l3_checklists:
      가맹계약 및 정보공개:
        - 정보공개서 제공 여부 및 시점
        - 가맹금·로열티 내역
        - 계약 체결 전 14일 숙려기간 준수
      대리점 및 총판계약:
        - 판매 지역·독점 여부
        - 최소 매입량·성과 조건
        - 계약 기간 및 갱신 조항
      거래중단 및 계약종료:
        - 계약 종료 통지 시점·사유
        - 갱신 거절 근거의 정당성
        - 재고·전속 설비 처리
      불공정거래행위:
        - 거래상 지위 남용 유형
        - 공정거래위원회 신고 여부
        - 계약 조항의 불공정성 판단 근거

  지분 및 주주 분쟁:
    focus:
      - 지분 구조 및 분쟁 당사자
      - 주주총회·이사회 결의 하자
      - 경영권 분쟁 경과
    l3_checklists:
      주식 양도 및 발행:
        - 양도 계약서·주주명부 기재
        - 양도 제한 조항 존재 여부
        - 신주 발행 절차 하자
      주주총회 결의 하자:
        - 소집 절차 위반 여부
        - 결의 내용의 법령·정관 위반
        - 결의취소·무효의 소 제기 기한
      주주간 계약 분쟁:
        - 계약서 존재 및 내용
        - 위반 행위 (경업/우선매수 등)
        - 이행 강제 가능성
      소수주주권 행사:
        - 보유 지분율 (3%/1% 등)
        - 행사 권리 (장부열람/임시총회소집 등)
        - 회사의 거부 사유
      경영권 분쟁:
        - 지분 구조 및 의결권 분포
        - 적대적 M&A 여부
        - 가처분·가압류 진행 여부

  임원 책임 및 영업보호:
    focus:
      - 이사·임원 의무 위반 여부
      - 영업비밀 침해·경업금지 쟁점
      - 손해배상 청구 주체
    l3_checklists:
      이사·임원 책임:
        - 선관주의·충실의무 위반 행위
        - 회사 손해액 산정
        - 면책 조항·경영판단 원칙 주장
      주주대표소송:
        - 제소 청구 통지 여부 (30일)
        - 보유 지분·기간 요건
        - 회사의 제소 거부 상황
      영업비밀 보호:
        - 영업비밀 요건 (비공지성·경제적 가치·관리)
        - 유출 경위 및 유출자
        - 부정경쟁방지법 적용 여부
      경업금지 및 전직금지:
        - 경업금지 약정 존재 및 기간
        - 대상 지역·업종 범위
        - 보상 조항 유무
