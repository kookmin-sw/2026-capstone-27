# 임대차보호 — SHIELD AI 사실관계 수집 체크리스트
# 온톨로지 L1 "임대차보호" 전용. L2 3개 / L3 13개 포함.

meta:
  l1: "임대차보호"
  slug: lease-protection
  version: 1

l1_checklist:
  required:
    - 상대방 정보 (임대인/임차인, 관계)
    - 발생 시기 (계약일, 분쟁 발생일)
    - 관련 금액 (보증금, 차임, 권리금)
    - 관련 문서 (임대차계약서, 확정일자 증빙)
    - 증거 자료 (전입신고 증명, 이체 내역, 통보 문자)
    - 기존 조치 이력 (내용증명, 임차권등기, 소송)
    - 원하는 결과 (보증금 회수, 갱신, 명도 방어)
  domain_specific:
    - 임대차 유형 (주택/상가, 전세/월세)
    - 보증금·차임 금액
    - 계약 기간 및 현재 단계
    - 전입신고·확정일자·대항력 상태
    - 분쟁 쟁점 (갱신/명도/보증금 반환 등)

l2_checklists:
  주택임대차보호:
    focus:
      - 대항력·우선변제권 취득 상태
      - 갱신요구권 행사 시점
      - 보증금 반환 단계
    l3_checklists:
      대항력 및 우선변제권:
        - 주택 인도 시점
        - 전입신고 일자
        - 확정일자 취득 여부 및 일자
      소액임차인 최우선변제:
        - 보증금액 (소액임차인 기준 부합 여부)
        - 담보물권 설정일과의 선후관계
        - 지역별 우선변제 한도 적용
      계약갱신요구권:
        - 갱신요구 통지 시점 (계약 만료 6~2개월 전)
        - 임대인 갱신 거절 사유 (실거주 등)
        - 계약 기간 및 횟수 (2+2)
      차임 증감 제한:
        - 임대인 증액 요구 시점
        - 증액 범위 (5% 상한 준수)
        - 직전 인상 후 1년 경과 여부
      보증금 반환 및 회수:
        - 계약 종료 및 인도 시점
        - 보증금 반환 지연 일수
        - 이행지체 이자 청구 의사

  상가건물임대차보호:
    focus:
      - 법 적용 범위 (환산보증금)
      - 10년 갱신요구권 행사
      - 권리금 회수 분쟁
    l3_checklists:
      적용범위 및 요건:
        - 환산보증금 (지역별 기준 부합 여부)
        - 사업자등록 여부
        - 영업 용도 확인
      계약갱신요구권:
        - 계약 기간 및 총 임차기간 (10년 이내)
        - 갱신요구 통지 시점 (6~1개월 전)
        - 임대인 거절 사유
      권리금 보호:
        - 신규 임차인 주선 여부
        - 임대인의 주선 방해 행위
        - 권리금 계약서 존재 여부
      차임 증감 제한:
        - 증액 청구 시점
        - 증액률 (5% 상한)
        - 직전 인상 후 1년 경과 여부

  임차인 보호 절차:
    focus:
      - 임차권등기 필요성
      - 분쟁조정 신청 여부
      - 소송 단계
    l3_checklists:
      임차권등기명령:
        - 임대차 종료 여부
        - 보증금 미반환 상태
        - 관할 법원 신청 여부
      임대차 분쟁조정:
        - 주택임대차분쟁조정위원회 신청 여부
        - 조정 대상 (차임/보증금/갱신)
        - 조정 결과 수용 의사
      보증금 반환 소송:
        - 소송 단계 (소장 제출/변론/판결)
        - 청구 금액 (보증금+지연이자)
        - 집행 대상 임대인 재산
      명도소송 대응:
        - 임대인 제기 명도소송 여부
        - 반대 항변 사유 (보증금 미반환 등)
        - 점유 상태 유지 여부
