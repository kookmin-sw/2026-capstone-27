# 손해배상·불법행위 — SHIELD AI 사실관계 수집 체크리스트
# 온톨로지 L1 "손해배상·불법행위" 전용. L2 5개 / L3 16개 포함.

meta:
  l1: "손해배상·불법행위"
  slug: damages-tort
  version: 1

l1_checklist:
  required:
    - 상대방 정보 (가해자, 관계, 연락처)
    - 발생 시기 (사고·침해 일시)
    - 관련 금액 (재산 손해, 정신적 피해액)
    - 관련 문서 (진단서, 수리 견적, 계약서)
    - 증거 자료 (사진, 영상, 목격자, 녹음)
    - 기존 조치 이력 (신고, 합의 시도, 보험 처리)
    - 원하는 결과 (배상액, 사과, 재발 방지)
  domain_specific:
    - 사고·피해 유형 (교통/의료/폭행/명예훼손 등)
    - 사고 일시 및 장소
    - 피해 정도 (신체 상해, 재산 손해, 정신적 피해)
    - 가해자 정보 및 관계
    - 보험 가입 및 경찰 신고 여부

l2_checklists:
  손해배상 일반:
    focus:
      - 불법행위 성립요건 충족 여부
      - 손해액 산정 기준
      - 과실상계 쟁점
    l3_checklists:
      불법행위 성립요건:
        - 가해행위·고의과실 존재
        - 위법성 판단 (정당행위 여부)
        - 인과관계 입증 자료
      재산적 손해 산정:
        - 적극적 손해 (치료비·수리비) 내역
        - 소극적 손해 (일실수익) 산정 근거
        - 영수증·견적서 증빙
      정신적 손해 및 위자료:
        - 정신적 고통 내용
        - 위자료 금액 산정 근거
        - 유사 판례 참조 여부
      과실상계 및 책임제한:
        - 피해자 과실 비율
        - 책임제한 사유 (공동불법행위 등)
        - 손익상계 대상 (보험금·합의금)

  교통사고:
    focus:
      - 사고 경위 및 과실비율
      - 보험 처리 단계
      - 후유장해 발생 여부
    l3_checklists:
      과실비율 산정:
        - 사고 상황 (신호·차로·속도)
        - 블랙박스·CCTV 확보 여부
        - 경찰 조사 결과 (교통사고사실확인원)
      보험 합의 및 소송:
        - 보험사 제시 합의안 금액
        - 합의 vs 소송 의사
        - 자동차손해배상보장법 적용 여부
      후유장해 및 일실수익:
        - 후유장해 등급 판정 여부
        - 노동능력상실률
        - 일실수익 산정 기간·소득

  의료사고:
    focus:
      - 진료 과정 및 과실 시점
      - 설명의무 이행 여부
      - 의료분쟁조정 진행 상태
    l3_checklists:
      진료 과실 및 설명의무:
        - 진료·수술 경과 및 문제 시점
        - 의사의 설명 및 동의서 존재
        - 표준 진료지침 위반 여부
      인과관계 및 입증책임:
        - 피해 발생과 진료행위의 인과
        - 의무기록·진료기록부 확보
        - 의료감정 신청 여부
      의료분쟁 조정 및 소송:
        - 한국의료분쟁조정중재원 신청 여부
        - 감정 결과 및 조정안
        - 소송 전환 의사

  인격권 침해:
    focus:
      - 침해 행위 유형 및 매체
      - 피해 확산 정도
      - 삭제·정정 요구 상태
    l3_checklists:
      명예훼손 및 모욕:
        - 침해 발언·게시 내용 원문
        - 공연성·사실적시 여부
        - 피해자 특정 가능성
      초상권 및 사생활 침해:
        - 촬영·유포 경위
        - 동의 여부 및 범위
        - 공공장소·사적공간 구분
      개인정보 침해:
        - 유출된 개인정보 범위
        - 유출 경위 (해킹/오남용/제3자 제공)
        - 2차 피해 발생 여부

  특수 불법행위 책임:
    focus:
      - 책임 주체 특정
      - 제조물·시설물 결함 여부
      - 사용관계·감독의무 쟁점
    l3_checklists:
      제조물 책임:
        - 제조물 종류 및 결함 유형
        - 통상적 사용 여부
        - 제조사·수입자 특정
      시설물 관리 책임:
        - 시설물 하자 내용
        - 점유자·소유자 구분
        - 관리 소홀 증거
      사용자 책임:
        - 피용자 불법행위 내용
        - 사무집행 관련성
        - 사용자 선임·감독 과실
