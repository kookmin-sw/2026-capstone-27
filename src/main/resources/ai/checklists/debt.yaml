# 채무·보증·개인파산·회생 — SHIELD AI 사실관계 수집 체크리스트
# 온톨로지 L1 "채무·보증·개인파산·회생" 전용. L2 5개 / L3 18개 포함.

meta:
  l1: "채무·보증·개인파산·회생"
  slug: debt
  version: 1

l1_checklist:
  required:
    - 상대방 정보 (채권자/채무자/보증인)
    - 발생 시기 (채무 발생일, 변제기)
    - 관련 금액 (원금, 이자, 지연손해금)
    - 관련 문서 (차용증, 계약서, 통장 내역)
    - 증거 자료 (이체 내역, 문자, 녹취)
    - 기존 조치 이력 (독촉, 지급명령, 소송, 집행)
    - 원하는 결과 (회수, 변제, 면책)
  domain_specific:
    - 채무 금액 및 이자율
    - 채권자 관계 (개인/금융기관/사채)
    - 대여·보증 시점 및 상환 현황
    - 차용증·계약서 존재 여부
    - 변제 능력 및 파산·회생 고려 여부

l2_checklists:
  금전채권 및 채무:
    focus:
      - 채무 발생 경위 및 변제 상태
      - 이자·지연손해금 산정
      - 시효 완성 여부
    l3_checklists:
      대여금 및 이자:
        - 차용증·계약서 작성 여부
        - 약정 이자율 (이자제한법 한도 내 여부)
        - 실제 송금·수령 증빙
      지연손해금 청구:
        - 변제기 경과 일수
        - 지연손해금 이율 (약정/법정)
        - 청구 통지 시점
      변제·상계·공탁:
        - 일부 변제 이력 및 금액
        - 상계 가능 반대채권 존재
        - 공탁 여부 및 공탁소
      채권양도 및 채무인수:
        - 양도·인수 계약 존재 여부
        - 채무자 통지·승낙 여부
        - 대항요건 구비 상태
      소멸시효:
        - 채권 종류별 시효 기간 (3년/5년/10년)
        - 시효중단 사유 (청구/압류/승인)
        - 시효 기산점

  보증:
    focus:
      - 보증 유형 (연대/일반/근보증)
      - 보증 한도 및 기간
      - 구상권 행사 의사
    l3_checklists:
      보증계약 성립 및 유형:
        - 서면 보증 여부 (보증인 보호법)
        - 연대보증 여부
        - 근보증 채권최고액
      보증책임 범위 및 한도:
        - 주채무 총액 및 이자
        - 보증 한도 초과 여부
        - 보증 소멸 사유 (주채무 소멸 등)
      보증인 구상권:
        - 보증인 변제 시점·금액
        - 주채무자에 대한 구상 청구
        - 공동보증인 분담 비율

  민사집행 및 보전처분:
    focus:
      - 집행권원 존재 여부
      - 보전처분 필요성
      - 집행 대상 재산 특정
    l3_checklists:
      지급명령 및 소액사건:
        - 지급명령 신청 여부 및 송달 상태
        - 이의신청 기한 (2주) 경과 여부
        - 소액사건 요건 (3천만원 이하)
      가압류 및 가처분:
        - 보전 대상 재산 (부동산/예금/급여)
        - 보전의 필요성·담보금
        - 본안소송 진행 여부
      강제집행 절차:
        - 집행권원 종류 (판결/공정증서/조서)
        - 집행 대상 (동산/부동산/채권)
        - 집행 진행 단계
      불법 채권추심 대응:
        - 추심 방식 (폭언/야간전화/가족접촉)
        - 증거 확보 여부
        - 금감원·경찰 신고 여부

  개인파산:
    focus:
      - 채무 규모 및 변제불능 상태
      - 파산 신청 단계
      - 면책 불허가 사유 존재 여부
    l3_checklists:
      파산 신청 요건:
        - 총 채무액 및 월 소득
        - 변제불능 사유 (실직/사업실패 등)
        - 재산 목록
      파산 절차:
        - 파산 신청·선고 단계
        - 관재인 선임 여부
        - 채권자집회 경과
      면책 및 불허가 사유:
        - 면책심문 진행 여부
        - 불허가 사유 해당 행위 (은닉/편파변제 등)
        - 과거 면책 이력 (7년 이내)

  개인회생:
    focus:
      - 정기 소득 여부 및 변제계획 가능성
      - 변제계획안 인가 단계
      - 변제 이행 상태
    l3_checklists:
      회생 신청 요건:
        - 정기 소득 존재 여부
        - 총 채무액 (담보 10억/무담보 5억 한도)
        - 최저생계비 산정
      변제계획안 및 인가:
        - 변제계획안 변제기간 (3~5년)
        - 채권자 이의 여부
        - 인가 결정 시점
      회생 면책:
        - 변제계획 이행 완료 여부
        - 면책 신청 시점
        - 잔여 채무 범위
