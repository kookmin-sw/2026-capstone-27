spring:
  application:
    name: shield

  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # PostgreSQL
  datasource:
    url: ${DB_URL}?prepareThreshold=0&stringtype=unspecified
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway (Phase A: PostgreSQL 마이그레이션 단일 소스화)
  # - ddl-auto: none 과 짝을 이뤄 Flyway가 스키마 관리자
  # - flyway_schema_history 부재 가정 → baseline-on-migrate=true, baseline-version=1 (V2부터 apply)
  # - placeholder-replacement=false: V3의 PL/pgSQL $$...$$ 및 SQL 내 ${...} 치환 사고 사전 차단
  flyway:
    enabled: true
    url: ${DB_URL}?prepareThreshold=0&stringtype=unspecified
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    locations: classpath:db/migration
    schemas: public
    table: flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Initial baseline before Flyway adoption"
    validate-on-migrate: true
    out-of-order: false
    placeholder-replacement: false

# JWT
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000
  refresh-token-expiry: 1209600000

# Google OAuth
google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI}

# Supabase Storage
supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    bucket: lawyer_documents

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

# Groq API
groq:
  api-key: ${GROQ_API_KEY}
  base-url: https://api.groq.com/openai
  model:
    chat: llama-3.3-70b-versatile
    brief: llama-3.3-70b-versatile
  timeout:
    connect: 5000
    read-chat: 30000
    read-brief: 60000
    read-classify: 15000
  chat:
    max-history-messages: 20
  classify:
    model: llama-3.3-70b-versatile
    temperature: 0.1
    max-tokens: 512

# RAG 검색 설정
# Phase A-5: PG 기반 PgLegalRetrievalService 도입 → 기본값 false
# (tsvector BM25 + pg_trgm 하이브리드). 긴급 fallback 시 RAG_STUB=true 로 override.
rag:
  retrieval:
    stub: ${RAG_STUB:false}

# 온톨로지 설정
ontology:
  slim-json-path: classpath:ontology/legal-ontology-slim.json
  cache-ttl-minutes: 60

# CORS
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:5174

server:
  port: 8080
